name: CI Pipeline - MLProject & Docker

on:
  push:
    branches: [ main, master ]

jobs:
  run-mlproject-and-dockerize:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow dagshub pandas scikit-learn matplotlib seaborn

    - name: Run MLProject (Training & Artifacts Logging)
      env:
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        # Berjalan di dalam folder MLProject
        mlflow run MLProject --no-conda

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Create Dockerfile dynamically
      run: |
        # Membuat Dockerfile secara otomatis untuk membungkus model
        echo "FROM python:3.11-slim" > Dockerfile
        echo "WORKDIR /app" >> Dockerfile
        echo "COPY MLProject/ /app/" >> Dockerfile
        echo "RUN pip install -r conda.yaml || true" >> Dockerfile
        echo "CMD [\"python\", \"modelling.py\"]" >> Dockerfile

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true

        tags: ownersahi/student-depression-model:latest